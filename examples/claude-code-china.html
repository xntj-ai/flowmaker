<title>国内安装 Claude Code 接入智谱 GLM · 小白攻略</title>
<link rel="stylesheet" href="https://esm.sh/@xyflow/react@12/dist/style.css" />
<style>
  :root {
    --bg: #f1f1f4;
    --ink: #1d1f24;
    --ink-dim: rgba(29, 31, 36, 0.56);
    --ink-faint: rgba(29, 31, 36, 0.38);
    --glass: rgba(255, 255, 255, 0.66);
    --glass-strong: rgba(255, 255, 255, 0.86);
    --line: rgba(20, 22, 28, 0.11);
    --gold: #b8922f;
    --gold-text: #8a6d1f;
    --gold-soft: rgba(184, 146, 47, 0.14);
    --blue: rgba(60, 100, 180, 0.9);
    --danger: #b4322f;
    --font: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui, -apple-system, "Segoe UI", sans-serif;
    --mono: "SF Mono", "JetBrains Mono", "Cascadia Code", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body, #app { height: 100%; margin: 0; }
  body {
    background:
      radial-gradient(1200px 720px at 50% -10%, rgba(184, 146, 47, 0.08), transparent 60%),
      radial-gradient(900px 620px at 88% 112%, rgba(60, 100, 180, 0.07), transparent 60%),
      var(--bg);
    color: var(--ink); font-family: var(--font); -webkit-font-smoothing: antialiased;
  }
  .react-flow { width: 100%; height: 100%; }

  .topbar {
    position: absolute; z-index: 10; top: 18px; left: 22px; right: 22px;
    display: flex; align-items: flex-start; justify-content: space-between; pointer-events: none;
  }
  .brand { pointer-events: auto; }
  .brand h1 { margin: 0; font-size: 17.5px; font-weight: 660; letter-spacing: 0.3px; display: flex; align-items: center; gap: 9px; }
  .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 10px rgba(184,146,47,0.6); }
  .brand p { margin: 6px 0 0 17px; font-size: 12.5px; color: var(--ink-dim); letter-spacing: 0.2px; }
  .actions { pointer-events: auto; display: flex; gap: 10px; }

  .btn {
    font-family: var(--font); font-size: 12.5px; color: var(--ink);
    background: var(--glass-strong); border: 1px solid var(--line);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    padding: 9px 15px; border-radius: 10px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 10px rgba(20,22,40,0.06); transition: all 0.18s ease;
  }
  .btn:hover { background: #fff; border-color: rgba(20,22,28,0.2); transform: translateY(-1px); }
  .btn.danger { color: var(--danger); border-color: rgba(180,50,47,0.3); background: rgba(180,50,47,0.06); box-shadow: none; }
  .btn.danger:hover { background: rgba(180,50,47,0.12); }

  /* 节点（矩形 / 圆角条） */
  .gnode {
    position: relative; width: 188px;
    background: var(--glass); border: 1px solid var(--line);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-radius: 14px; padding: 13px 16px;
    box-shadow: 0 6px 22px rgba(20,22,40,0.09), inset 0 1px 0 rgba(255,255,255,0.7);
    transition: border-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
  }
  .gnode:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(20,22,40,0.13); }
  .react-flow__node.selected .gnode { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(184,146,47,0.3), 0 10px 28px rgba(20,22,40,0.14); }
  .gnode .gn-kicker { font-size: 10.5px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 5px; font-weight: 650; }
  .gnode .gn-title { font-size: 14.5px; font-weight: 660; line-height: 1.35; }
  .gnode .gn-sub { font-size: 12px; color: var(--ink-dim); margin-top: 5px; line-height: 1.45; }
  .gn-detail {
    margin-top: 10px; font-family: var(--font); font-size: 11px; color: var(--blue); font-weight: 560;
    background: rgba(60,100,180,0.08); border: 1px solid rgba(60,100,180,0.22);
    padding: 3px 10px; border-radius: 7px; cursor: pointer; transition: all 0.15s ease;
  }
  .gn-detail:hover { background: rgba(60,100,180,0.16); }
  .diamond-content .gn-detail { display: none; }
  .react-flow.exporting .gn-detail { display: none; }

  .gnode.gold {
    background: linear-gradient(158deg, var(--gold-soft), rgba(255,255,255,0.85));
    border-color: rgba(184, 146, 47, 0.6);
    box-shadow: 0 8px 26px rgba(184,146,47,0.18), inset 0 1px 0 rgba(255,255,255,0.8);
  }
  .gnode.gold .gn-title { color: var(--gold-text); }
  .gnode.gold .gn-kicker { color: var(--gold); }
  .gnode.muted { background: rgba(20,22,28,0.025); border: 1px dashed rgba(20,22,28,0.18); box-shadow: none; opacity: 0.78; }
  .gnode.muted .gn-title { color: var(--ink-dim); font-weight: 580; }
  .gnode.start { border-color: rgba(60, 100, 180, 0.42); }
  .gnode.start .gn-kicker { color: var(--blue); }

  /* 形状：起止（大圆角卡片，不用 999px 以免内容多时胀成气球） */
  .gnode.terminator { border-radius: 28px; padding: 13px 20px; }

  /* 形状：判断（扁菱形，SVG 多边形） */
  .gnode-wrap.decision { width: 168px; height: 70px; position: relative; display: flex; align-items: center; justify-content: center; }
  .diamond-svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; filter: drop-shadow(0 5px 12px rgba(20,22,40,0.11)); transition: filter 0.18s ease; }
  .gnode-wrap.decision:hover .diamond-svg { filter: drop-shadow(0 9px 18px rgba(20,22,40,0.16)); }
  /* polygon 的 fill/stroke 改为内联属性（GlassNode 内），CSS 仅保留选中态高亮 */
  .react-flow__node.selected .diamond-svg polygon { stroke: var(--gold); stroke-width: 2; }
  .diamond-content { position: relative; z-index: 1; text-align: center; max-width: 102px; }
  .diamond-content .gn-kicker, .diamond-content .gn-sub { display: none; }
  .diamond-content .gn-title { font-size: 12.5px; font-weight: 500; color: var(--ink-dim); letter-spacing: 0; line-height: 1.4; }

  /* 导出扁平模式：关掉 html-to-image 渲染不良的阴影/毛玻璃，底色转纯色 */
  .react-flow.exporting .gnode {
    box-shadow: none !important; backdrop-filter: none !important; -webkit-backdrop-filter: none !important;
    background: #ffffff;
  }
  .react-flow.exporting .gnode.gold { background: #fbf4dd; }
  .react-flow.exporting .gnode.muted { background: #fafafa; }
  .react-flow.exporting .diamond-svg { filter: none !important; }

  .react-flow__handle { width: 8px; height: 8px; background: rgba(20,22,28,0.42); border: 1px solid #fff; }
  .react-flow__handle:hover { background: var(--gold); }
  .react-flow__edge-path { stroke: rgba(20,22,28,0.22); stroke-width: 1.5; }
  .react-flow__edge.animated .react-flow__edge-path { stroke: rgba(20,22,28,0.42); }
  .react-flow__edge-text { fill: var(--ink); font-size: 11px; font-family: var(--font); }
  .react-flow__edge-textbg { fill: #ffffff; }

  .react-flow__controls { box-shadow: 0 6px 18px rgba(20,22,40,0.12); border-radius: 10px; overflow: hidden; }
  .react-flow__controls-button { background: #fff; border-bottom: 1px solid rgba(20,22,28,0.07); color: var(--ink); }
  .react-flow__controls-button:hover { background: #f3f3f5; }
  .react-flow__controls-button svg { fill: var(--ink-dim); }
  .react-flow__minimap { border-radius: 10px; overflow: hidden; border: 1px solid var(--line); box-shadow: 0 6px 18px rgba(20,22,40,0.1); }
  .react-flow__attribution { background: transparent; color: var(--ink-faint); font-size: 10px; }
  .react-flow__attribution a { color: var(--ink-faint); }

  .editpanel {
    position: absolute; z-index: 20; top: 78px; right: 22px; width: 266px;
    background: var(--glass-strong); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--line); border-radius: 16px; padding: 16px 16px 14px; box-shadow: 0 16px 44px rgba(20,22,40,0.18);
  }
  .ep-head { display: flex; justify-content: space-between; align-items: center; font-size: 13.5px; font-weight: 660; }
  .ep-x { border: none; background: transparent; cursor: pointer; font-size: 14px; color: var(--ink-dim); padding: 2px 4px; }
  .ep-x:hover { color: var(--ink); }
  .ep-l { display: block; font-size: 11px; letter-spacing: 0.5px; color: var(--ink-faint); margin: 11px 0 5px; font-weight: 650; }
  .ep-i, .ep-t { width: 100%; font-family: var(--font); font-size: 13px; color: var(--ink); background: #fff; border: 1px solid var(--line); border-radius: 9px; padding: 8px 10px; outline: none; }
  .ep-i:focus, .ep-t:focus { border-color: rgba(184,146,47,0.6); }
  .ep-t { resize: vertical; line-height: 1.45; }
  .ep-actions { display: flex; gap: 8px; margin-top: 15px; }
  .ep-actions .btn { flex: 1; }

  /* 详情浮层模态 */
  .detail-backdrop {
    position: fixed; inset: 0; z-index: 40; display: flex; align-items: center; justify-content: center; padding: 24px;
    background: rgba(20,22,28,0.28); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  }
  .detail-card {
    width: min(520px, 92vw); max-height: 80vh; overflow: auto;
    background: var(--glass-strong); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--line); border-radius: 18px; padding: 22px 24px;
    box-shadow: 0 30px 80px rgba(20,22,40,0.28);
  }
  .dc-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .dc-kicker { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); font-weight: 680; }
  .dc-title { font-size: 18px; font-weight: 680; margin-top: 3px; line-height: 1.3; }
  .dc-body { font-size: 13.5px; line-height: 1.72; color: var(--ink); word-break: break-word; }
  .dc-body p { margin: 0 0 11px; }
  .dc-body a { color: var(--blue); text-decoration: underline; text-underline-offset: 2px; font-weight: 560; }
  .dc-body a:hover { color: #294e9c; }
  .dc-body code { font-family: var(--mono); font-size: 12.3px; background: rgba(20,22,28,0.06); border: 1px solid var(--line); border-radius: 5px; padding: 1px 5px; word-break: break-all; }
  .dc-body pre { background: #1b1d22; color: #d6d8de; font-family: var(--mono); font-size: 12.3px; line-height: 1.62; padding: 12px 14px; border-radius: 10px; overflow-x: auto; margin: 8px 0 12px; white-space: pre-wrap; word-break: break-word; }
  .dc-body pre code { background: none; border: none; padding: 0; color: inherit; }
  .dc-body .os { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 6px; margin: 14px 0 6px; }
  .dc-body .os.win { background: rgba(60,100,180,0.12); color: #294e9c; }
  .dc-body .os.mac { background: rgba(20,22,28,0.08); color: var(--ink); }
  .dc-body ul, .dc-body ol { margin: 6px 0 11px; padding-left: 20px; }
  .dc-body li { margin: 3px 0; }
  .dc-body .warn { color: #b4322f; font-weight: 560; }
  .dc-body .tip { background: var(--gold-soft); border-left: 3px solid var(--gold); padding: 8px 12px; border-radius: 0 8px 8px 0; margin: 8px 0 12px; font-size: 13px; }
</style>

{
  "imports": {

  "subtitle": "节点是步骤概述，点蓝色「详情 ▾」看分系统的完整命令与解释 · 链接可点 · 右上角可导出 PNG",
  "direction": "TB",
  "nodes": [
    { "id": "start", "kicker": "Start", "title": "开始", "sub": "从零跟着做", "shape": "terminator", "variant": "start",
      "detail": "<p><b>Claude Code</b> 是 Anthropic 出的命令行 AI 编程工具——在终端里就能让 AI 帮你读写代码、跑命令、修 bug。</p><p>这份攻略带你<b>从零</b>装好，并接入国内可直连的<b>智谱 GLM</b>，全程不用每天挂代理。每一步点「详情 ▾」都有分系统的完整命令和解释。</p>" },

    { "id": "node", "kicker": "Step 1", "title": "安装 Node.js", "sub": "Claude Code 的运行环境",
      "detail": "<p>Claude Code 是用 <b>Node.js</b> 写的，得先把 Node 装上才能装它。装一次，以后不用再管。要求 <b>Node 18 或更高</b>。</p><span class='os win'>🪟 Windows</span><p>打开 <a href='https://nodejs.org/' target='_blank'>nodejs.org</a> → 下载 <b>LTS</b> 版的 <code>.msi</code> 安装包 → 双击，一路「下一步」装完。</p><span class='os mac'>🍎 macOS</span><p>同样去 <a href='https://nodejs.org/' target='_blank'>nodejs.org</a> 下 <b>LTS</b> 的 <code>.pkg</code> 双击安装；或者用 Homebrew 一行装：</p><pre><code>brew install node</code></pre><p><b>装完验证</b>（两个系统一样）：打开终端输入下面两行，能看到版本号就成功（第一个要 ≥ v18）：</p><pre><code>node -v\nnpm -v</code></pre><div class='tip'>终端在哪？Windows：开始菜单搜 <code>PowerShell</code> 打开；macOS：访达 → 应用程序 → 实用工具 → <b>终端</b>。</div><p class='warn'>⚠ Windows 若提示「不是内部命令」，重启电脑，或把 <code>C:\\Program Files\\nodejs\\</code> 加进系统环境变量 PATH。</p>" },

    { "id": "mirror", "kicker": "Step 2", "title": "换淘宝镜像源", "sub": "下载提速，且不用翻墙",
      "detail": "<p>npm（Node 的下载工具）默认从国外服务器拉包，国内又慢又容易卡。把下载源换成<b>阿里巴巴的国内镜像</b>（淘宝源），速度快很多，而且<b>这一步不需要翻墙</b>。</p><p>两个系统命令一样，终端里粘贴回车：</p><pre><code>npm config set registry https://registry.npmmirror.com</code></pre><p>验证换成功没（返回里有 npmmirror 就对了）：</p><pre><code>npm config get registry</code></pre><div class='tip'>这只是改下载地址，不影响别的。哪天想换回官方源：<code>npm config set registry https://registry.npmjs.org</code></div>" },

    { "id": "install", "kicker": "Step 3", "title": "安装 Claude Code", "sub": "一行命令全局安装",
      "detail": "<p>用 npm 把 Claude Code 装到电脑上。<code>-g</code> 表示<b>全局安装</b>（装一次，任何文件夹都能用）。两个系统命令一样：</p><pre><code>npm install -g @anthropic-ai/claude-code</code></pre><p>等它下载安装完成（换过淘宝源会快不少）。</p><span class='os mac'>🍎 macOS 注意</span><p class='warn'>⚠ <b>千万别在前面加 <code>sudo</code></b>！会带来权限和安全问题。万一报 <code>EACCES</code> 权限错误，照 <a href='https://code.claude.com/docs/en/setup' target='_blank'>官方文档</a>把 npm 全局目录改到自己的目录，别用 sudo 绕过。</p><div class='tip'>以后升级用：<code>npm install -g @anthropic-ai/claude-code@latest</code>（别用 <code>npm update -g</code>）。</div>" },

    { "id": "verify1", "kicker": "Step 4", "title": "验证安装", "sub": "确认装好了",
      "detail": "<p>检查一下到底装没装上。终端输入：</p><pre><code>claude --version</code></pre><p>能打印出一串版本号，就说明<b>安装成功</b>。再让它自检一下配置：</p><pre><code>claude doctor</code></pre><p class='warn'>⚠ 如果提示 <code>command not found</code> 或「不是内部命令」：多半是 PATH 还没生效。<b>先彻底关掉终端、重新打开</b>再试；还不行就重启电脑。</p>" },

    { "id": "q_auth", "title": "用官方还是第三方？", "shape": "decision" },

    { "id": "official", "kicker": "路线 A", "title": "官方直连", "sub": "国内不友好，了解即可", "variant": "muted",
      "detail": "<p>这条是「用 Anthropic 官方账号直连」。对国内用户<b>不友好</b>，列出来让你知道为什么不推荐。</p><p>中国大陆不在 Anthropic 支持地区，而且它<b>每次请求都会校验你的 IP 归属地</b>（不只登录那一下）。所以你需要：</p><ul><li>一个<b>稳定的海外代理</b>，最好是住宅 IP——机房 IP / 共享 VPN 会被识别，照样报 unsupported region；</li><li>一个付费的 <b>Pro / Max / Console</b> 账号（免费版不含 Claude Code）。</li></ul><p>配好代理后，进项目目录执行 <code>claude</code>，按浏览器提示登录即可。</p><div class='tip'>不想每天开代理、嫌麻烦 → 走右边「第三方 · 智谱」，国内可直连，省心。</div>" },

    { "id": "zhipu_key", "kicker": "路线 B · 智谱", "title": "注册智谱、拿 API Key", "sub": "开通 Coding Plan",
      "detail": "<p>智谱（GLM）提供和 Claude <b>兼容</b>的接口，国内能直连，是最省心的方案。</p><p><b>三步拿到 Key：</b></p><ol><li>打开 <a href='https://www.bigmodel.cn/' target='_blank'>bigmodel.cn</a> 注册 / 登录（智谱开放平台）。</li><li>开通 <b>GLM Coding Plan</b>——这是专门给编程工具用的套餐，按套餐配额走，比按 token 计费划算。</li><li>在控制台的「API Key」页<b>复制你的 Key</b>，先存到记事本，下一步要粘。</li></ol><div class='tip'>官方配置说明：<a href='https://docs.bigmodel.cn/cn/coding-plan/quick-start' target='_blank'>GLM Coding Plan 快速开始 ↗</a></div><p class='warn'>⚠ API Key 等于密码：别发给别人、别截图上传、别提交到公开 GitHub 仓库。</p>" },

    { "id": "zhipu_cfg", "kicker": "路线 B · 智谱", "title": "写配置文件 settings.json", "sub": "告诉 CC 连智谱",
      "detail": "<p>现在告诉 Claude Code：「别连官方，连智谱」。做法是建/改一个配置文件 <code>settings.json</code>。</p><span class='os win'>🪟 Windows · 文件位置</span><p>（把 <code>你的用户名</code> 换成实际登录名；没有 <code>.claude</code> 文件夹就新建一个）：</p><pre><code>C:\\Users\\你的用户名\\.claude\\settings.json</code></pre><span class='os mac'>🍎 macOS · 文件位置</span><pre><code>~/.claude/settings.json</code></pre><p><b>两个系统文件内容一样</b>，把下面整段粘进去，再把 <code>&lt;你的智谱Key&gt;</code> 换成刚复制的 Key：</p><pre><code>{\n  \"env\": {\n    \"ANTHROPIC_BASE_URL\": \"https://open.bigmodel.cn/api/anthropic\",\n    \"ANTHROPIC_AUTH_TOKEN\": \"&lt;你的智谱Key&gt;\",\n    \"API_TIMEOUT_MS\": \"3000000\"\n  }\n}</code></pre><p><b>每行什么意思：</b></p><ul><li><code>ANTHROPIC_BASE_URL</code>：把请求发到智谱的服务器，而不是 Anthropic 官方。</li><li><code>ANTHROPIC_AUTH_TOKEN</code>：填你的 Key。<b class='warn'>注意是 AUTH_TOKEN，不是 API_KEY，别填错。</b></li><li><code>API_TIMEOUT_MS</code>：把超时调长，复杂任务不容易断。</li><li>模型不用填——智谱端点会默认用最新的 <b>GLM-5.2</b>。</li></ul>" },

    { "id": "clean", "kicker": "Step 5", "title": "清理残留环境变量", "sub": "防止旧设置覆盖",
      "detail": "<p>如果你电脑里以前设过 Anthropic 的环境变量，它会<b>盖过</b>刚写的配置文件，导致连不上。先清掉它们（没设过就直接跳过这步）。</p><span class='os win'>🪟 Windows（PowerShell）</span><pre><code>Remove-Item Env:ANTHROPIC_API_KEY -ErrorAction SilentlyContinue\nRemove-Item Env:ANTHROPIC_BASE_URL -ErrorAction SilentlyContinue</code></pre><span class='os mac'>🍎 macOS</span><pre><code>unset ANTHROPIC_API_KEY\nunset ANTHROPIC_BASE_URL</code></pre><div class='tip'>原理：环境变量的优先级<b>高于</b> settings.json，残留的旧值会悄悄顶掉你的新配置，是新手最常见的「配了但连不上」原因。</div>" },

    { "id": "launch", "kicker": "Step 6", "title": "启动并验证接入", "sub": "跑起来测一句",
      "detail": "<p>一切就绪，跑起来。先在终端进到你的项目文件夹，再启动：</p><pre><code>cd 你的项目目录\nclaude</code></pre><p>进去后用斜杠命令检查接得对不对：</p><ul><li><code>/status</code>：看连接状态、当前接的是哪个服务地址。</li><li><code>/model</code>：看现在用的是哪个模型。</li></ul><p>随便发一句「你好，帮我看下这个项目」，能正常回复，就说明<b>接通了</b> 🎉</p><div class='tip'>Windows 第一次用，建议顺手装 <a href='https://git-scm.com/download/win' target='_blank'>Git for Windows</a>，Claude Code 调用 Bash 工具时更顺。</div>" },

    { "id": "done", "kicker": "Done", "title": "完成 🎉", "sub": "开始用 Claude Code", "shape": "terminator", "variant": "gold",
      "detail": "<p>装好了！现在可以让 Claude Code 帮你读代码、修 bug、加功能、跑命令。</p><p><b>进阶玩法：</b>把 skill 放进 <code>~/.claude/skills/</code> 给它扩展能力——比如这份攻略图就是用 <a href='https://github.com/xntj-ai/flowmaker' target='_blank'>flowmaker</a> 生成的。</p>" }
  ],
  "edges": [
    { "source": "start", "target": "node" },
    { "source": "node", "target": "mirror" },
    { "source": "mirror", "target": "install" },
    { "source": "install", "target": "verify1" },
    { "source": "verify1", "target": "q_auth" },

    { "source": "q_auth", "target": "official", "label": "官方直连", "dashed": true },
    { "source": "q_auth", "target": "zhipu_key", "label": "第三方 · 智谱（推荐）" },

    { "source": "official", "target": "launch", "label": "配好海外代理" },
    { "source": "zhipu_key", "target": "zhipu_cfg" },
    { "source": "zhipu_cfg", "target": "clean" },
    { "source": "clean", "target": "launch" },
    { "source": "launch", "target": "done" }
  ]
}
</script>

<script type="module">
import React, { useCallback, useState, useEffect } from "react";
import { createRoot } from "react-dom/client";
import {
  ReactFlow, ReactFlowProvider, Background, Controls, MiniMap, Handle, Position,
  addEdge, useNodesState, useEdgesState, useReactFlow,
  getNodesBounds, getViewportForBounds, MarkerType
} from "@xyflow/react";
import dagre from "@dagrejs/dagre";
import { toPng } from "html-to-image";
import htm from "htm";

const html = htm.bind(React.createElement);
const DATA = JSON.parse(document.getElementById("flow-data").textContent);
const ARROW = { type: MarkerType.ArrowClosed, color: "rgba(20,22,28,0.42)" };

/* ---------- 自定义节点 ---------- */
function GlassNode({ id, data }) {
  const v = data.variant ? " " + data.variant : "";
  const shape = data.shape || "process";
  const openDetail = (e) => {
    e.stopPropagation();
    window.dispatchEvent(new CustomEvent("flow-detail", { detail: id }));
  };
  const content = html`
    ${data.kicker ? html`<div class="gn-kicker">${data.kicker}</div>` : null}
    <div class="gn-title">${data.title}</div>
    ${data.sub ? html`<div class="gn-sub">${data.sub}</div>` : null}
    ${data.detail ? html`<button class="gn-detail" onMouseDown=${(e) => e.stopPropagation()} onClick=${openDetail}>详情 ▾</button>` : null}`;
  const handles = html`
    <${React.Fragment}>
      <${Handle} type="target" position=${Position.Top} id="t" />
      <${Handle} type="target" position=${Position.Left} id="tl" />
      <${Handle} type="source" position=${Position.Bottom} id="b" />
      <${Handle} type="source" position=${Position.Right} id="r" />
    <//>`;
  if (shape === "decision") {
    const dv = data.variant;
    const fill = dv === "gold" ? "#fbf4dd" : dv === "muted" ? "#f4f4f6" : "#ffffff";
    const stroke = dv === "gold" ? "rgba(184,146,47,0.7)"
      : dv === "muted" ? "rgba(20,22,28,0.24)"
      : dv === "start" ? "rgba(60,100,180,0.55)" : "rgba(20,22,28,0.2)";
    return html`
      <div class="gnode-wrap decision">
        ${handles}
        <svg class=${"diamond-svg" + v} viewBox="0 0 168 70" preserveAspectRatio="none">
          <polygon points="84,3 165,35 84,67 3,35"
            fill=${fill} stroke=${stroke} stroke-width="1.4" stroke-linejoin="round"
            stroke-dasharray=${dv === "muted" ? "5 4" : "0"} />
        </svg>
        <div class="diamond-content">${content}</div>
      </div>`;
  }
  return html`<div class=${"gnode " + shape + v}>${handles}${content}</div>`;
}
const nodeTypes = { glass: GlassNode };

/* ---------- 尺寸估算（供 dagre 自动布局） ---------- */
function sizeOf(d) {
  if ((d.shape || "process") === "decision") return [168, 70];
  if (d.shape === "terminator") return [188, d.sub ? 76 : 56];
  return [188, d.sub ? 86 : 60];
}

/* ---------- 构建 nodes / edges ---------- */
function buildNodes() {
  return DATA.nodes.map((d) => {
    const [w, h] = sizeOf(d);
    return {
      id: d.id, type: "glass",
      position: { x: d.x ?? 0, y: d.y ?? 0 },
      data: { title: d.title, sub: d.sub || "", kicker: d.kicker || "", detail: d.detail || "", shape: d.shape || "process", variant: d.variant || "" },
      _w: w, _h: h, _placed: d.x !== undefined && d.y !== undefined,
    };
  });
}
function buildEdges() {
  return DATA.edges.map((e, i) => ({
    id: e.id || ("e" + i), source: e.source, target: e.target,
    sourceHandle: e.sh || "b", targetHandle: e.th || "t",
    type: "smoothstep", animated: e.animated ?? !e.dashed,
    label: e.label || undefined,
    labelStyle: { fill: "#1d1f24", fontWeight: 500 },
    labelBgStyle: { fill: "#ffffff" },
    labelBgPadding: [7, 4], labelBgBorderRadius: 6,
    markerEnd: ARROW,
    style: e.dashed
      ? { stroke: "rgba(20,22,28,0.18)", strokeWidth: 1.5, strokeDasharray: "5 4" }
      : { stroke: "rgba(20,22,28,0.42)", strokeWidth: 1.5 },
  }));
}

/* ---------- dagre 自动布局（任一节点缺坐标即触发） ---------- */
function autoLayout(nodes, edges) {
  if (nodes.every((n) => n._placed)) return nodes;
  const g = new dagre.graphlib.Graph();
  g.setGraph({ rankdir: DATA.direction || "TB", nodesep: 42, ranksep: 74, marginx: 24, marginy: 24 });
  g.setDefaultEdgeLabel(() => ({}));
  nodes.forEach((n) => g.setNode(n.id, { width: n._w, height: n._h }));
  edges.forEach((e) => g.setEdge(e.source, e.target));
  dagre.layout(g);
  return nodes.map((n) => {
    const p = g.node(n.id);
    return { ...n, position: { x: p.x - n._w / 2, y: p.y - n._h / 2 } };
  });
}

/* ---------- 编辑面板 ---------- */
function NodePanel({ node, onField, onDelete, onClose }) {
  if (!node) return null;
  const d = node.data;
  return html`
    <div class="editpanel">
      <div class="ep-head"><span>编辑节点</span><button class="ep-x" onClick=${onClose}>✕</button></div>
      <label class="ep-l">小标签 / Stage</label>
      <input class="ep-i" value=${d.kicker || ""} onChange=${(e) => onField("kicker", e.target.value)} />
      <label class="ep-l">主标题</label>
      <input class="ep-i" value=${d.title || ""} onChange=${(e) => onField("title", e.target.value)} />
      <label class="ep-l">子标题（节点上显示的概述）</label>
      <textarea class="ep-t" rows="2" value=${d.sub || ""} onChange=${(e) => onField("sub", e.target.value)}></textarea>
      <label class="ep-l">详情（点「详情 ▾」展开层）</label>
      <textarea class="ep-t" rows="4" value=${d.detail || ""} onChange=${(e) => onField("detail", e.target.value)}></textarea>
      <label class="ep-l">形状</label>
      <select class="ep-i" value=${d.shape || "process"} onChange=${(e) => onField("shape", e.target.value)}>
        <option value="process">处理（矩形）</option>
        <option value="terminator">起止（圆角条）</option>
        <option value="decision">判断（菱形）</option>
      </select>
      <label class="ep-l">配色</label>
      <select class="ep-i" value=${d.variant || ""} onChange=${(e) => onField("variant", e.target.value)}>
        <option value="">普通</option>
        <option value="start">蓝（起点）</option>
        <option value="gold">金（强调）</option>
        <option value="muted">灰（弱化）</option>
      </select>
      <div class="ep-actions">
        <button class="btn danger" onClick=${onDelete}>删除节点</button>
        <button class="btn" onClick=${onClose}>完成</button>
      </div>
    </div>`;
}

function EdgePanel({ edge, onLabel, onDelete, onClose }) {
  if (!edge) return null;
  return html`
    <div class="editpanel">
      <div class="ep-head"><span>编辑连线</span><button class="ep-x" onClick=${onClose}>✕</button></div>
      <label class="ep-l">连线文字</label>
      <input class="ep-i" autoFocus=${true} value=${edge.label || ""} placeholder="如：是 / 否 / 通过"
             onChange=${(e) => onLabel(e.target.value)} />
      <div class="ep-actions">
        <button class="btn danger" onClick=${onDelete}>删除连线</button>
        <button class="btn" onClick=${onClose}>完成</button>
      </div>
    </div>`;
}

function DetailModal({ node, onClose }) {
  if (!node) return null;
  const d = node.data;
  return html`
    <div class="detail-backdrop" onClick=${onClose}>
      <div class="detail-card" onClick=${(e) => e.stopPropagation()}>
        <div class="dc-head">
          <div>
            ${d.kicker ? html`<span class="dc-kicker">${d.kicker}</span>` : null}
            <div class="dc-title">${d.title}</div>
          </div>
          <button class="ep-x" onClick=${onClose}>✕</button>
        </div>
        <div class="dc-body" dangerouslySetInnerHTML=${{ __html: d.detail }}></div>
      </div>
    </div>`;
}

/* ---------- App ---------- */
let eseq = 1;
const INIT_EDGES = buildEdges();
const INIT_NODES = autoLayout(buildNodes(), INIT_EDGES);

function Flow() {
  const [nodes, setNodes, onNodesChange] = useNodesState(INIT_NODES);
  const [edges, setEdges, onEdgesChange] = useEdgesState(INIT_EDGES);
  const [editId, setEditId] = useState(null);
  const [editEdgeId, setEditEdgeId] = useState(null);
  const [detailId, setDetailId] = useState(null);
  const { getNodes } = useReactFlow();

  useEffect(() => {
    const h = (e) => setDetailId(e.detail);
    window.addEventListener("flow-detail", h);
    return () => window.removeEventListener("flow-detail", h);
  }, []);

  const onExport = useCallback(() => {
    const vpEl = document.querySelector(".react-flow__viewport");
    const rootEl = document.querySelector(".react-flow");
    if (!vpEl) return;
    const bounds = getNodesBounds(getNodes());
    const w = Math.round(bounds.width * 2) + 160;
    const h = Math.round(bounds.height * 2) + 160;
    const vp = getViewportForBounds(bounds, w, h, 0.2, 4, 0.12);
    if (rootEl) rootEl.classList.add("exporting");
    toPng(vpEl, {
      backgroundColor: "#f1f1f4", width: w, height: h, pixelRatio: 1,
      style: { width: w + "px", height: h + "px",
        transform: `translate(${vp.x}px, ${vp.y}px) scale(${vp.zoom})` },
    }).then((dataUrl) => {
      const a = document.createElement("a");
      a.download = (DATA.title || "flowchart") + ".png";
      a.href = dataUrl; a.click();
    }).finally(() => { if (rootEl) rootEl.classList.remove("exporting"); });
  }, [getNodes]);

  const editNode = nodes.find((n) => n.id === editId) || null;
  const editEdge = edges.find((e) => e.id === editEdgeId) || null;
  const detailNode = nodes.find((n) => n.id === detailId) || null;

  const onConnect = useCallback((params) => {
    const id = "ne_" + (eseq++);
    setEdges((eds) => addEdge({ ...params, id, type: "smoothstep", animated: true, label: "",
      labelStyle: { fill: "#1d1f24", fontWeight: 500 }, labelBgStyle: { fill: "#ffffff" },
      labelBgPadding: [7, 4], labelBgBorderRadius: 6, markerEnd: ARROW,
      style: { stroke: "rgba(20,22,28,0.42)", strokeWidth: 1.5 } }, eds));
    setEditId(null); setEditEdgeId(id);
  }, [setEdges]);

  const onNodeDoubleClick = useCallback((_e, node) => { setEditEdgeId(null); setEditId(node.id); }, []);
  const onEdgeClick = useCallback((_e, edge) => { setEditId(null); setEditEdgeId(edge.id); }, []);

  const onField = useCallback((field, value) => {
    setNodes((nds) => nds.map((n) => n.id === editId ? { ...n, data: { ...n.data, [field]: value } } : n));
  }, [editId, setNodes]);
  const onEdgeLabel = useCallback((value) => {
    setEdges((eds) => eds.map((e) => e.id === editEdgeId ? { ...e, label: value } : e));
  }, [editEdgeId, setEdges]);

  const deleteNode = useCallback(() => {
    setEdges((eds) => eds.filter((e) => e.source !== editId && e.target !== editId));
    setNodes((nds) => nds.filter((n) => n.id !== editId));
    setEditId(null);
  }, [editId, setNodes, setEdges]);
  const deleteEdge = useCallback(() => {
    setEdges((eds) => eds.filter((e) => e.id !== editEdgeId));
    setEditEdgeId(null);
  }, [editEdgeId, setEdges]);

  const addNode = useCallback(() => {
    const id = "n_" + (eseq++);
    setNodes((nds) => nds.concat({ id, type: "glass", position: { x: 80 + (eseq % 4) * 40, y: 80 + eseq * 24 },
      data: { title: "新节点", sub: "双击改名 · 拖圆点连线", kicker: "", detail: "", shape: "process", variant: "" } }));
    setEditEdgeId(null); setEditId(id);
  }, [setNodes]);

  return html`
    <${React.Fragment}>
      <div class="topbar">
        <div class="brand">
          <h1><span class="dot"></span>${DATA.title || "flowmaker"}</h1>
          ${DATA.subtitle ? html`<p>${DATA.subtitle}</p>` : null}
        </div>
        <div class="actions">
          <button class="btn" onClick=${onExport}>导出 PNG</button>
          <button class="btn" onClick=${addNode}>＋ 添加节点</button>
        </div>
      </div>

      <${NodePanel} node=${editNode} onField=${onField} onDelete=${deleteNode} onClose=${() => setEditId(null)} />
      <${EdgePanel} edge=${editEdge} onLabel=${onEdgeLabel} onDelete=${deleteEdge} onClose=${() => setEditEdgeId(null)} />
      <${DetailModal} node=${detailNode} onClose=${() => setDetailId(null)} />

      <${ReactFlow}
        nodes=${nodes} edges=${edges} nodeTypes=${nodeTypes}
        onNodesChange=${onNodesChange} onEdgesChange=${onEdgesChange} onConnect=${onConnect}
        onNodeDoubleClick=${onNodeDoubleClick} onEdgeClick=${onEdgeClick}
        fitView fitViewOptions=${{ padding: 0.18 }} minZoom=${0.3}
        deleteKeyCode=${["Backspace", "Delete"]}
      >
        <${Background} variant="dots" gap=${26} size=${1} color="rgba(20,22,28,0.06)" />
        <${MiniMap} pannable zoomable maskColor="rgba(241,241,244,0.7)" style=${{ background: "#ffffff" }}
          nodeColor=${(n) => n.data?.variant === "gold" ? "#d8b24a" : n.data?.variant === "muted" ? "rgba(20,22,28,0.18)" : "rgba(20,22,28,0.4)"} />
        <${Controls} showInteractive=${false} />
      <//>
    <//>`;
}

function App() {
  return html`<${ReactFlowProvider}><${Flow} /><//>`;
}

createRoot(document.getElementById("app")).render(html`<${App} />`);
</script>
</body>
</html>
